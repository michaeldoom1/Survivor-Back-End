---
openapi: 3.0.1
info:
  title: Survivor API
  version: v1
paths:
  "/signup":
    post:
      summary: Creates a user account
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: user created
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
  "/login":
    post:
      summary: Logs in and returns a JWT
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: logged in
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/logout":
    delete:
      summary: Logs out and revokes the current JWT
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: logged out
        '401':
          description: missing token
  "/me":
    get:
      summary: Returns the currently authenticated user
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: current user
        '401':
          description: not authenticated
  "/contestants":
    get:
      summary: Retrieves all contestants
      tags:
      - Contestants
      security:
      - bearerAuth: []
      responses:
        '200':
          description: contestants found
        '401':
          description: unauthenticated
    post:
      summary: Creates a contestant
      tags:
      - Contestants
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: contestant created
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contestant:
                  type: object
                  properties:
                    name:
                      type: string
                    gender:
                      type: string
                    tribename:
                      type: string
                  required:
                  - name
                  - gender
  "/contestants/{id}":
    get:
      summary: Retrieves a contestant
      tags:
      - Contestants
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '200':
          description: contestant found
        '404':
          description: contestant not found
        '401':
          description: unauthenticated
    put:
      summary: Updates a contestant
      tags:
      - Contestants
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: contestant updated
        '404':
          description: contestant not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contestant:
                  type: object
                  properties:
                    name:
                      type: string
                    gender:
                      type: string
                    tribename:
                      type: string
    delete:
      summary: Deletes a contestant
      tags:
      - Contestants
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      security:
      - bearerAuth: []
      responses:
        '204':
          description: contestant deleted
        '404':
          description: contestant not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: http://localhost:3000
  description: Local development
