---
openapi: 3.0.1
info:
  title: Survivor API
  version: v1
paths:
  "/signup":
    post:
      summary: Creates a user account
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: user created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
  "/login":
    post:
      summary: Logs in and returns a JWT
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/logout":
    delete:
      summary: Logs out and revokes the current JWT
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: missing token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/me":
    get:
      summary: Returns the currently authenticated user
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
        '401':
          description: not authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  "/contestants":
    get:
      summary: Retrieves all contestants
      tags:
      - Contestants
      security:
      - bearerAuth: []
      responses:
        '200':
          description: contestants found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    gender:
                      type: string
                    tribename:
                      type: string
                      nullable: true
                    season_id:
                      type: integer
                    occupation:
                      type: string
                      nullable: true
                    bio:
                      type: string
                      nullable: true
                    age:
                      type: integer
                      nullable: true
                    photo_url:
                      type: string
                      nullable: true
                    video_url:
                      type: string
                      nullable: true
                    created_at:
                      type: string
                    updated_at:
                      type: string
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Creates a contestant
      tags:
      - Contestants
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: contestant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  gender:
                    type: string
                  tribename:
                    type: string
                    nullable: true
                  season_id:
                    type: integer
                  occupation:
                    type: string
                    nullable: true
                  bio:
                    type: string
                    nullable: true
                  age:
                    type: integer
                    nullable: true
                  photo_url:
                    type: string
                    nullable: true
                  video_url:
                    type: string
                    nullable: true
                  created_at:
                    type: string
                  updated_at:
                    type: string
        '422':
          description: invalid age and photo_url
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                contestant:
                  type: object
                  properties:
                    name:
                      type: string
                    gender:
                      type: string
                    tribename:
                      type: string
                    season_id:
                      type: integer
                    occupation:
                      type: string
                    bio:
                      type: string
                    age:
                      type: integer
                    photo_url:
                      type: string
                    video_url:
                      type: string
                  required:
                  - name
                  - gender
                  - season_id
  "/contestants/scores":
    get:
      summary: Retrieves all contestants in a season with their episode scores and
        total
      tags:
      - Contestants
      parameters:
      - name: season_id
        in: query
        required: true
        schema:
          type: integer
      security:
      - bearerAuth: []
      responses:
        '200':
          description: scores found
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    gender:
                      type: string
                    tribename:
                      type: string
                      nullable: true
                    total_points:
                      type: integer
                    episode_scores:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          episode_number:
                            type: integer
                          scoring_event:
                            type: string
                          points:
                            type: integer
        '400':
          description: missing season_id param
          content:
            application/json:
