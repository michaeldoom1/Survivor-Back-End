---
openapi: 3.0.1
info:
  title: Survivor API
  version: v1
paths:
  "/signup":
    post:
      summary: Creates a user account
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: user created
        '422':
          description: invalid request
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
  "/login":
    post:
      summary: Logs in and returns a JWT
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: logged in
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/logout":
    delete:
      summary: Logs out and revokes the current JWT
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: logged out
        '401':
          description: missing token
  "/me":
    get:
      summary: Returns the currently authenticated user
      tags:
      - Authentication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: current user
        '401':
          description: not authenticated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: http://localhost:3000
  description: Local development
